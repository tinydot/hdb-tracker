name: Fetch HDB Listings

# Runs on a self-hosted runner (must be a Singapore-IP machine).
# GitHub-hosted runners are geo-blocked by the HDB IAM service.
#
# To set up a self-hosted runner on your Windows PC:
#   Repo → Settings → Actions → Runners → New self-hosted runner
#
# Alternatively, run scripts/scrape.py directly via Windows Task Scheduler.

on:
  schedule:
    - cron: '0 22 * * *'  # Daily at 6 AM SGT (UTC+8)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: self-hosted   # <-- change to ubuntu-latest if using a SG VPS runner
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt && playwright install chromium

      - name: Fetch HDB listings
        run: python3 scripts/scrape.py
