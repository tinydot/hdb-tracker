name: Fetch HDB Listings

on:
  schedule:
    - cron: '0 22 * * *'  # Daily at 6 AM SGT (UTC+8)
  workflow_dispatch:       # Allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch HDB API data
        run: |
          mkdir -p data
          curl -sf \
            -H "accept: application/json, text/plain, */*" \
            -H "content-type: application/json" \
            -X POST \
            --data-raw '{"location":"","coordinates":[["",""]],"range":"2","priceRangeLower":"0","priceRangeUpper":"0","flatType":"","waitingTime":"","modeOfSale":"","floorRange":"","remainingLeaseRangeLower":1,"remainingLeaseRangeUpper":99,"ethnicGroup":"","citizenship":"","extension":"","contra":"","rank":"Location, Price Range, Flat Type, Remaining Lease","salesPerson":false,"town":"","classification":""}' \
            https://homes.hdb.gov.sg/home-api/public/v1/map/getCoordinatesByFilters \
            -o data/hdb.json
          echo "Fetched $(wc -c < data/hdb.json) bytes"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hdb.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update HDB listings data $(date -u '+%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi
