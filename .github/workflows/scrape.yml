name: Fetch HDB Listings

on:
  schedule:
    - cron: '0 22 * * *'  # Daily at 6 AM SGT (UTC+8)
  workflow_dispatch:       # Allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Check HDB_COOKIE secret
        run: |
          if [ -z "${{ secrets.HDB_COOKIE }}" ]; then
            echo "::warning::HDB_COOKIE secret is not set."
            echo "GitHub Actions servers are outside Singapore and are geo-blocked by the HDB IAM service."
            echo "The script will likely fail. To fix:"
            echo "  1. Open https://homes.hdb.gov.sg/home/finding-a-flat in Chrome"
            echo "  2. DevTools → Network → any getCoordinatesByFilters request"
            echo "  3. Copy the full 'cookie:' header value"
            echo "  4. Repo Settings → Secrets → Actions → New secret: HDB_COOKIE"
          fi

      - name: Fetch HDB listings
        env:
          HDB_COOKIE: ${{ secrets.HDB_COOKIE }}
        run: python3 scripts/scrape.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hdb.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update HDB listings data $(date -u '+%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi
